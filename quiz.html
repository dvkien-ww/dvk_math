<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz Pro</title>
  <style>
    body { font-family: Arial; text-align: center; }
    button { margin: 5px; padding: 10px; }
    .selected { background-color: lightblue; }
  </style>
</head>

<body>

<h2 id="timer">Time: 60</h2>
<h2 id="question"></h2>
<div id="answers"></div>
<button onclick="next()">Câu tiếp</button>

<script>
const questions = [
  { q: "1 + 1 = ?", a: ["1","2","3"], correct: 1 },
  { q: "2 + 2 = ?", a: ["2","3","4"], correct: 2 },
  { q: "3 + 3 = ?", a: ["5","6","7"], correct: 1 }
];

// 🔀 random câu hỏi
questions.sort(() => Math.random() - 0.5);

let current = 0;
let score = 0;
let answered = false;

// ⏱️ TIMER
let time = 60;
const timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = "Time: " + time;
  if (time <= 0) finish();
}, 1000);

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById("question").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      if (i === q.correct) {
        score++;
        btn.style.backgroundColor = "green";
      } else {
        btn.style.backgroundColor = "red";
      }
    };

    answersDiv.appendChild(btn);
  });
}

function next() {
  if (!answered) {
    alert("Chọn đáp án đã!");
    return;
  }

  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    finish();
  }
}

function finish() {
  clearInterval(timer);
  document.body.innerHTML =
    "<h1>Kết quả</h1>" +
    "<p>Điểm: " + score + "/" + questions.length + "</p>";
}

loadQuestion();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DVK Math</title>

<!-- MathJax (LaTeX) -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #f5f6fa;
  margin: 0;
}

#container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.section-title {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
}

.question {
  margin: 15px 0;
  font-size: 16px;
}

.answers button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  cursor: pointer;
}

.answers button:hover {
  background: #eef3ff;
}

.selected {
  background: #dbe4ff !important;
  border: 1px solid #4c6ef5 !important;
}

.ds-row {
  margin: 10px 0;
}

.ds-row button {
  margin-left: 10px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

#timer {
  text-align: right;
  font-weight: bold;
  margin-bottom: 10px;
}

.nav {
  margin-top: 20px;
}

.nav button {
  padding: 10px 20px;
  margin-right: 10px;
  border-radius: 8px;
  border: none;
  background: #4c6ef5;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="container">

  <div id="timer">Time: 600</div>

  <div id="exam"></div>

  <div class="nav">
    <button onclick="prev()">← Trước</button>
    <button onclick="next()">Tiếp →</button>
    <button onclick="submitQuiz()">Nộp bài</button>
  </div>

</div>

<script>
let questions = [];
let current = 0;
let answers = [];

// LOAD JSON
fetch("questions.json")
  .then(res => res.json())
  .then(data => {

    let TN = data.filter(q => q.type === "TN");
    let DS = data.filter(q => q.type === "DS");
    let TLN = data.filter(q => q.type === "TLN");

    TN.sort(() => Math.random() - 0.5);
    DS.sort(() => Math.random() - 0.5);
    TLN.sort(() => Math.random() - 0.5);

    TN = TN.slice(0, 12);
    DS = DS.slice(0, 2);
    TLN = TLN.slice(0, 4);

    questions = [...TN, ...DS, ...TLN];
    questions.sort(() => Math.random() - 0.5);

    answers = new Array(questions.length).fill(null);

    loadQuestion();
  });

// TIMER
let time = 600;
const timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = "Time: " + time;
  if (time <= 0) submitQuiz();
}, 1000);

// LOAD QUESTION
function loadQuestion() {
  const q = questions[current];
  const exam = document.getElementById("exam");

  let html = "";

  // TN
  if (q.type === "TN") {
    html += `<div class="section">
      <div class="section-title">Phần I. Trắc nghiệm</div>
      <div class="question"><b>Câu ${current+1}:</b> ${q.q}</div>
      <div class="answers">`;

    q.choices.forEach((c, i) => {
      let sel = answers[current] === i ? "selected" : "";
      html += `<button class="${sel}" onclick="selectTN(${i})">${c}</button>`;
    });

    html += `</div></div>`;
  }

  // DS
  if (q.type === "DS") {
    html += `<div class="section">
      <div class="section-title">Phần II. Đúng/Sai</div>
      <div class="question"><b>Câu ${current+1}:</b> ${q.q}</div>`;

    ["a","b","c","d"].forEach(k => {
      html += `<div class="ds-row">
        <b>${k})</b> ${q.items[k]}
        <button onclick="selectDS('${k}',true)">Đúng</button>
        <button onclick="selectDS('${k}',false)">Sai</button>
      </div>`;
    });

    html += `</div>`;
  }

  // TLN
  if (q.type === "TLN") {
    html += `<div class="section">
      <div class="section-title">Phần III. Trả lời ngắn</div>
      <div class="question"><b>Câu ${current+1}:</b> ${q.q}</div>
      <input maxlength="4"
        value="${answers[current] || ""}"
        placeholder="Nhập đáp án..."
        oninput="selectTLN(this.value)">
    </div>`;
  }

  exam.innerHTML = html;

  // render LaTeX
  if (window.MathJax) {
    MathJax.typesetPromise();
  }
}

// SELECT
function selectTN(i) {
  answers[current] = i;
  loadQuestion();
}

function selectDS(k,val) {
  if (!answers[current]) answers[current] = {};
  answers[current][k] = val;
  loadQuestion();
}

function selectTLN(val) {
  answers[current] = val.replace(/\s/g,"");
}

// NAV
function next() {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  }
}

function prev() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

// SUBMIT
function submitQuiz() {
  clearInterval(timer);
  let score = 0;

  questions.forEach((q,i) => {

    if (q.type === "TN" && answers[i] === q.correct) score++;

    if (q.type === "DS") {
      let ok = true;
      for (let k of ["a","b","c","d"]) {
        if (answers[i]?.[k] !== q.correct[k]) ok = false;
      }
      if (ok) score++;
    }

    if (q.type === "TLN") {
      if (Array.isArray(q.correct)) {
        if (q.correct.includes(answers[i])) score++;
      } else {
        if (answers[i] === q.correct) score++;
      }
    }

  });

  document.body.innerHTML =
    "<h1>Kết quả</h1><p>Điểm: " + score + "/" + questions.length + "</p>";
}
</script>

</body>
</html>

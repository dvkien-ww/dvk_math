<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVK MATH - Thầy Dương Văn Kiên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; --bg: #f8f9fa; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #auth-screen, #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #setup-screen { z-index: 2000; display: none; overflow-y: auto; justify-content: flex-start; padding: 40px 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; border: 1px solid #eee; }
        #sidebar { width: 280px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .q-circle { aspect-ratio: 1; border-radius: 8px; background: #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .q-circle.active { border: 2px solid var(--primary); color: var(--primary); }
        .q-circle.done { background: var(--success); color: white; }
        .question-paper { background: white; padding: 25px; border-radius: 12px; min-height: 350px; font-size: 1.1rem; line-height: 1.6; border: 1px solid #eee; }
        .option-item { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .ds-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .selected-t { background: var(--success); color: white; }
        .selected-f { background: var(--danger); color: white; }
        #timer { font-size: 24px; font-weight: bold; color: var(--danger); text-align: right; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-finish { background: var(--danger); color: white; margin-top: auto; width: 100%; }
        #result-screen { display: none; padding: 20px; text-align: center; background: white; min-height: 100vh; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p>Đang gửi bài...</p></div>

<div id="auth-screen">
    <div class="card">
        <h2 style="color:var(--primary)">DVK MATH</h2>
        <input type="text" id="un" class="btn" style="width:100%; border:1px solid #ddd; margin:10px 0" placeholder="Họ và tên">
        <input type="text" id="uc" class="btn" style="width:100%; border:1px solid #ddd; margin:10px 0" placeholder="Lớp">
        <button class="btn" style="background:var(--primary); color:white; width:100%" onclick="login()">VÀO HỌC</button>
    </div>
</div>

<div id="setup-screen">
    <h2>Chào <span id="hello"></span>!</h2>
    <div class="card">
        <select id="gr" class="btn" style="width:100%; border:1px solid #ddd" onchange="loadCh()"><option value="">-- Khối --</option><option value="10">Lớp 10</option><option value="11">Lớp 11</option><option value="12">Lớp 12</option></select>
        <select id="ch" class="btn" style="width:100%; border:1px solid #ddd; margin:10px 0"><option value="">-- Chương --</option></select>
        <div style="display:flex; gap:10px;"><button class="btn t-btn" style="flex:1" onclick="st(45,this)">45p</button><button class="btn t-btn" style="flex:1" onclick="st(60,this)">60p</button><button class="btn t-btn" style="flex:1" onclick="st(90,this)">90p</button></div>
        <button class="btn" style="background:var(--success); color:white; width:100%; margin-top:15px" onclick="go()">BẮT ĐẦU</button>
    </div>
</div>

<div id="sidebar" class="hidden">
    <h3>Tiến độ</h3><div class="q-grid" id="qg"></div>
    <button class="btn btn-finish" onclick="submit()">NỘP BÀI</button>
</div>

<div id="main-content" class="hidden">
    <div id="timer">00:00</div>
    <div class="question-paper" id="paper"></div>
    <div style="display:flex; justify-content:space-between; margin-top:20px;"><button class="btn" onclick="nav(-1)">Trước</button><button class="btn" style="background:var(--primary); color:white" onclick="nav(1)">Tiếp</button></div>
</div>

<div id="result-screen">
    <h1>KẾT QUẢ: <span id="rs"></span></h1>
    <div id="rt" style="max-width:600px; margin:auto; text-align:left"></div>
    <button class="btn" style="background:var(--primary); color:white; margin:20px" onclick="location.reload()">LÀM ĐỀ KHÁC</button>
</div>

<script>
    // 1. DÁN LINK CỦA THẦY VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGmlL2P0x-29rCB-3wE-CoIaGjFQRdlF1IEFqK81xHYMq1q-o09V84od6EZGgU_Vu0/exec";
    
    let all = [], exam = [], ans = [], cur = 0, mins = 0, timer;
    let user = JSON.parse(localStorage.getItem('dvk_u'));

    window.onload = () => {
        if(user) { document.getElementById('auth-screen').style.display='none'; showS(); }
        fetch('questions.json').then(r=>r.json()).then(d=>all=d);
    };

    function render(el) { if(window.renderMathInElement) renderMathInElement(el, {delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}]}); }
    function login() { 
        const n=document.getElementById('un').value, c=document.getElementById('uc').value;
        if(!n||!c) return; user={n,c}; localStorage.setItem('dvk_u', JSON.stringify(user)); location.reload();
    }
    function showS() { document.getElementById('setup-screen').style.display='flex'; document.getElementById('hello').innerText=user.n; }
    function loadCh() {
        const g=document.getElementById('gr').value, s=document.getElementById('ch');
        s.innerHTML = '<option value="">-- Chương --</option>';
        [...new Set(all.filter(q=>q.grade==g).map(q=>q.chapter))].forEach(c=>s.innerHTML+=`<option value="${c}">${c}</option>`);
    }
    function st(m,b) { mins=m; document.querySelectorAll('.t-btn').forEach(x=>x.style.background='#eee'); b.style.background='#bbdefb'; }
    
    function go() {
        const c=document.getElementById('ch').value; if(!c||!mins) return;
        const p=all.filter(q=>q.grade==document.getElementById('gr').value && q.chapter==c);
        exam = p.sort(()=>0.5-Math.random()).slice(0, mins==45?12:20);
        ans = new Array(exam.length).fill(null);
        document.getElementById('setup-screen').style.display='none';
        document.querySelectorAll('#sidebar, #main-content').forEach(x=>x.classList.remove('hidden'));
        let s=mins*60; timer=setInterval(()=>{ s--; document.getElementById('timer').innerText=`${Math.floor(s/60)}:${s%60<10?'0':''}${s%60}`; if(s<=0) submit(); },1000);
        draw();
    }

    function draw() {
        const q=exam[cur], p=document.getElementById('paper');
        let h=`<b>Câu ${cur+1}:</b> ${q.q}<br><br>`;
        if(q.type==='TN') h+=q.choices.map((c,i)=>`<div class="option-item" onclick="setT(${i})"><input type="radio" ${ans[cur]===i?'checked':''}> ${c}</div>`).join('');
        else if(q.type==='DS') h+=Object.keys(q.items).map(k=>`<div>${k}. ${q.items[k]} <button class="ds-btn ${ans[cur]?.[k]===true?'selected-t':''}" onclick="setD('${k}',true)">Đ</button> <button class="ds-btn ${ans[cur]?.[k]===false?'selected-f':''}" onclick="setD('${k}',false)">S</button></div><br>`).join('');
        else h+=`<input type="text" class="btn" style="border:1px solid #ddd" oninput="setL(this.value)" value="${ans[cur]||''}">`;
        p.innerHTML=h; render(p);
        document.getElementById('qg').innerHTML=exam.map((_,i)=>`<div class="q-circle ${i===cur?'active':''} ${ans[i]!==null?'done':''}" onclick="cur=${i};draw()">${i+1}</div>`).join('');
    }

    function setT(i){ans[cur]=i;draw();}
    function setD(k,v){if(!ans[cur])ans[cur]={};ans[cur][k]=v;draw();}
    function setL(v){ans[cur]=v;draw();}
    function nav(s){cur=Math.max(0,Math.min(exam.length-1,cur+s));draw();}

    async function submit() {
        if(!confirm("Nộp bài?")) return;
        clearInterval(timer); document.getElementById('loading-overlay').style.display='flex';
        let s=0; exam.forEach((q,i)=>{
            if(q.type==='TN'&&ans[i]===q.correct) s+=0.25;
            else if(q.type==='DS'){let m=0; ["a","b","c","d"].forEach(k=>{if(ans[i]?.[k]===q.correct[k])m++;}); s+=(m===4?1:m===3?0.5:0);}
            else if(q.type==='TLN'&&String(ans[i])==String(q.correct)) s+=0.5;
        });
        const res={name:user.n, class:user.c, chapter:exam[0].chapter, score:s.toFixed(2)};
        try { await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(res)}); } catch(e){}
        
        document.getElementById('loading-overlay').style.display='none';
        document.querySelectorAll('#sidebar, #main-content').forEach(x=>x.classList.add('hidden'));
        document.getElementById('result-screen').style.display='block';
        document.getElementById('rs').innerText=res.score;
        document.getElementById('rt').innerHTML=exam.map((q,i)=>`<div style="border-bottom:1px solid #eee; padding:10px"><b>Câu ${i+1}:</b> ${q.explain||'N/A'}</div>`).join('');
        render(document.getElementById('rt'));
    }
</script>
</body>
</html>

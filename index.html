<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>App Thi Hoàn Chỉnh</title>

<style>
body {
  font-family: Arial;
  display: flex;
}

/* Sidebar */
#sidebar {
  width: 150px;
  border-right: 1px solid #ccc;
  padding: 10px;
}

.q-btn {
  display: block;
  margin: 5px 0;
  padding: 5px;
  cursor: pointer;
}

.answered {
  background: lightgreen;
}

.current {
  border: 2px solid blue;
}

/* Main */
#main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

button {
  margin: 5px;
  padding: 10px;
}

.selected {
  background: lightblue;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar"></div>

<!-- Main -->
<div id="main">
  <h2 id="timer">Time: 60</h2>
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>

  <button onclick="prev()">← Trước</button>
  <button onclick="next()">Tiếp →</button>
  <br><br>
  <button onclick="submitQuiz()">NỘP BÀI</button>
</div>

<script>
let questions = [];
let current = 0;
let answers = [];

// LOAD JSON
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    // chia loại
    let TN = data.filter(q => q.type === "TN");
    let DS = data.filter(q => q.type === "DS");
    let TLN = data.filter(q => q.type === "TLN");

    // trộn
    TN.sort(() => Math.random() - 0.5);
    DS.sort(() => Math.random() - 0.5);
    TLN.sort(() => Math.random() - 0.5);

    // lấy số lượng
    TN = TN.slice(0, 12);
    DS = DS.slice(0, 2);
    TLN = TLN.slice(0, 4);

    // gộp + trộn
    questions = [...TN, ...DS, ...TLN];
    questions.sort(() => Math.random() - 0.5);

    answers = new Array(questions.length).fill(null);

    loadQuestion();
  });

// LOAD CÂU
function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progress").innerText =
    "Câu " + (current + 1) + "/" + questions.length;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  // ===== TN =====
  if (q.type === "TN") {
    q.choices.forEach((choice, i) => {
      const btn = document.createElement("button");
      btn.innerText = choice;

      if (answers[current] === i) {
        btn.classList.add("selected");
      }

      btn.onclick = () => {
        answers[current] = i;
        loadQuestion();
      };

      answersDiv.appendChild(btn);
    });
  }

  // ===== ĐS =====
  if (q.type === "DS") {
    const keys = ["a", "b", "c", "d"];

    keys.forEach((k, idx) => {
      const div = document.createElement("div");
      div.innerHTML = `<b>${k})</b> ${q.items[k]}`;

      ["Đúng", "Sai"].forEach((ans, i) => {
        const btn = document.createElement("button");
        btn.innerText = ans;

        if (answers[current]?.[k] === (i === 0)) {
          btn.classList.add("selected");
        }

        btn.onclick = () => {
          if (!answers[current]) answers[current] = {};
          answers[current][k] = (i === 0);
          loadQuestion();
        };

        div.appendChild(btn);
      });

      answersDiv.appendChild(div);
    });
  }

  // ===== TLN =====
  if (q.type === "TLN") {
    const input = document.createElement("input");
    input.placeholder = "Nhập đáp án (tối đa 4 ký tự)";
    input.maxLength = 4;

    input.value = answers[current] || "";

    input.oninput = (e) => {
      let val = e.target.value;

      // chuẩn hóa: bỏ khoảng trắng
      val = val.replace(/\s/g, "");

      answers[current] = val;
    };

    answersDiv.appendChild(input);
  }
}

// ===== NAV =====
function next() {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  }
}

function prev() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

// ===== NỘP BÀI =====
function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {

    // TN
    if (q.type === "TN") {
      if (answers[i] === q.correct) score++;
    }

    // ĐS
    if (q.type === "DS") {
      let correctAll = true;
      for (let k of ["a", "b", "c", "d"]) {
        if (answers[i]?.[k] !== q.correct[k]) {
          correctAll = false;
          break;
        }
      }
      if (correctAll) score++;
    }

    // TLN
    if (q.type === "TLN") {
      if (Array.isArray(q.correct)) {
        if (q.correct.includes(answers[i])) score++;
      } else {
        if (answers[i] === q.correct) score++;
      }
    }

  });

  document.body.innerHTML =
    "<h1>Kết quả</h1>" +
    "<p>Điểm: " + score + "/" + questions.length + "</p>";
}
</script>

</body>
</html>
